name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86-64, avx2]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y g++ make binutils
      - name: Download NNUE
        run: make net
      - name: Build
        run: make linux-${{ matrix.arch }}
