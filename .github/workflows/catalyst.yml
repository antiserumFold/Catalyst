name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release "
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86-64, avx2, bmi2, avx512, avx512vnni]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y g++ make objcopy

      - name: Download NNUE
        run: make net

      - name: Build
        run: make linux-${{ matrix.arch }}

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package
        run: |
          EXE=$(grep -m1 '^EXE' Makefile | sed 's/.*=\s*//' | tr -d '[:space:]')
          VERSION=$(grep -m1 '^VERSION' Makefile | sed 's/.*=\s*//' | tr -d '[:space:]')
          BINARY="bin/${EXE}-linux-${{ matrix.arch }}"
          ZIP_NAME="${EXE}-v${VERSION}-linux-${{ matrix.arch }}.zip"
          zip -j "$ZIP_NAME" "$BINARY" README.md LICENSE
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 1

  build-windows:
    name: Windows (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86-64, avx2, bmi2, avx512, avx512vnni]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y g++ make objcopy mingw-w64

      - name: Download NNUE
        run: make net

      - name: Build
        run: make win-${{ matrix.arch }}

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package
        run: |
          EXE=$(grep -m1 '^EXE' Makefile | sed 's/.*=\s*//' | tr -d '[:space:]')
          VERSION=$(grep -m1 '^VERSION' Makefile | sed 's/.*=\s*//' | tr -d '[:space:]')
          BINARY="bin/${EXE}-win-${{ matrix.arch }}.exe"
          ZIP_NAME="${EXE}-v${VERSION}-win-${{ matrix.arch }}.zip"
          zip -j "$ZIP_NAME" "$BINARY" README.md LICENSE
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 1

  release:
    name: Publish Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List packages
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Catalyst ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*.zip