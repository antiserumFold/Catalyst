name: Bug Report
description: Report a bug or incorrect behavior in Catalyst
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: version
    attributes:
      label: Catalyst Version
      description: Which version of Catalyst are you using? (e.g. v3.0.0)
      placeholder: v3.0.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - Windows
        - macOS
        - Other
    validations:
      required: true

  - type: dropdown
    id: binary
    attributes:
      label: Binary / Architecture
      description: Which binary are you running?
      options:
        - native
        - bmi2
        - avx512
        - avx512vnni
        - avx2
        - x86-64
        - Other / Unknown
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this? Include UCI commands, FEN positions, or test cases if relevant.
      placeholder: |
        1. Send UCI command ...
        2. Position: rnbqkbnr/...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Logs, screenshots, or anything else that might help.
    validations:
      required: false